
<!-- SLIDER -->
<section class="slider">
  <div class="slides">
    {{#each slider.items}}
      <div class="slide {{#if @first}}active{{/if}}">
        <img src="{{this.image}}" alt="{{this.heading}}">
        <div class="overlay">
          <h2>{{this.heading}}</h2>
          <p>{{this.subtext}}</p>
        </div>
      </div>
    {{/each}}
  </div>

  <button class="prev">❮</button>
  <button class="next">❯</button>
</section>

<section class="readmore">
  {{#each readmore.items}}
    <div class="readmore-item">
      <img src="{{this.image}}" alt="{{this.title}}">

      <div class="readmore-text">
        <h2>{{this.title}}</h2>
	  <div class="home-content">
          {{{this.content_html}}}
      </div>
       </div>
    </div>
  {{/each}}
</section>


<script>
  window.autoSlideTime = {{slider.auto_slide_ms}};
</script>

<script src="css/readmore.js"></script>
